version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      security:
        applies-to: 'security-updates'
        patterns:
          - '*'
      non-major:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      major:
        applies-to: 'version-updates'
        update-types:
          - 'major'
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      security:
        applies-to: 'security-updates'
        patterns:
          - '*'
      non-major:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      major:
        applies-to: 'version-updates'
        update-types:
          - 'major'
        patterns:
          - '*'

  - package-ecosystem: 'nuget'
    directories:
      - '/LiftTrackerApi'
      - '/LiftTrackerApi.Tests'
    schedule:
      interval: 'monthly'
      time: '09:00'
      timezone: 'Pacific/Auckland'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      security:
        applies-to: 'security-updates'
        patterns:
          - '*'
      non-major:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      major:
        applies-to: 'version-updates'
        update-types:
          - 'major'
        patterns:
          - '*'
