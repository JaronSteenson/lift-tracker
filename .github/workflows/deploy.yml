name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect_changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.ref }}
          filters: |
            frontend:
              - '.github/workflows/**'
              - 'resources/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'
              - 'vitest.config.js'
              - '.eslintrc.js'
              - '.prettierrc.js'
              - 'config.template.json'
              - 'ci/replace-config.js'
              - 'ci/version-service-worker.js'
            backend:
              - '.github/workflows/**'
              - 'LiftTrackerApi/**'
              - 'LiftTrackerApi.Tests/**'

  frontend:
    name: Build, test, deploy frontend
    needs: detect_changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build test config
        run: node ci/replace-config.js test-stub=true

      - name: Run tests
        run: npm test

      - name: Build production config
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}
          AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
          ROLLBAR_ACCESS_TOKEN: ${{ secrets.ROLLBAR_ACCESS_TOKEN }}
          NEW_RELIC_APPLICATION_ID: ${{ secrets.NEW_RELIC_APPLICATION_ID }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: |
          set -euo pipefail
          : "${AUTH0_DOMAIN:?AUTH0_DOMAIN repository variable is required}"
          : "${AUTH0_CLIENT_ID:?AUTH0_CLIENT_ID repository variable is required}"
          : "${AUTH0_AUDIENCE:?AUTH0_AUDIENCE repository variable is required}"
          node ci/replace-config.js

      - name: Build frontend
        env:
          BITBUCKET_COMMIT: ${{ github.sha }}
        run: npm run prod

      - name: Prepare remote frontend directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            rm -rf /tmp/deploy-frontend
            mkdir -p /tmp/deploy-frontend

      - name: Upload frontend artifact
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: dist/*
          target: /tmp/deploy-frontend
          strip_components: 1

      - name: Deploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -eux
            find /var/www/html/lift-tracker -mindepth 1 -maxdepth 1 ! -name publish -exec rm -rf {} +
            cp -a /tmp/deploy-frontend/. /var/www/html/lift-tracker/
            sudo systemctl reload nginx

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_AUTH_TOKEN: ${{ secrets.CLOUDFLARE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          zone_id=$(
            curl --fail-with-body --silent "https://api.cloudflare.com/client/v4/zones?name=lift-tracker.app" \
              -H "Authorization: Bearer $CLOUDFLARE_AUTH_TOKEN" \
              | node -e "let body=''; process.stdin.on('data', chunk => body += chunk); process.stdin.on('end', () => { const response = JSON.parse(body); const zoneId = response.result?.[0]?.id; if (!zoneId) { console.error(body); process.exit(1); } process.stdout.write(zoneId); });"
          )
          curl --fail-with-body \
            -X POST "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  backend:
    name: Build, test, deploy backend
    needs: detect_changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect_changes.outputs.backend == 'true' }}
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lift_tracker_api_test
          MYSQL_USER: lift_tracker_api_test
          MYSQL_PASSWORD: lift_tracker_api_test
          MYSQL_ROOT_PASSWORD: lift_tracker_api_test_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -plift_tracker_api_test_root --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Restore dotnet tools
        working-directory: LiftTrackerApi
        run: dotnet tool restore

      - name: Check formatting
        working-directory: LiftTrackerApi
        run: dotnet csharpier check . && dotnet csharpier check ../LiftTrackerApi.Tests

      - name: Migrate test database
        working-directory: LiftTrackerApi
        env:
          ASPNETCORE_ENVIRONMENT: Test
        run: dotnet ef database update

      - name: Run backend tests
        working-directory: LiftTrackerApi
        run: dotnet test

      - name: Build production settings
        working-directory: LiftTrackerApi
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
        run: |
          set -euo pipefail
          : "${DB_CONNECTION_STRING:?DB_CONNECTION_STRING secret is required}"
          : "${AUTH0_DOMAIN:?AUTH0_DOMAIN repository variable is required}"
          : "${AUTH0_AUDIENCE:?AUTH0_AUDIENCE repository variable is required}"
          envsubst < appsettings.Production.template.json > appsettings.Production.json

      - name: Publish backend
        working-directory: LiftTrackerApi
        run: dotnet publish LiftTrackerApi.csproj -c Release -r linux-x64 --self-contained true -o ./publish

      - name: Prepare remote backend directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            rm -rf /tmp/deploy-backend
            mkdir -p /tmp/deploy-backend

      - name: Upload backend artifact
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: LiftTrackerApi/publish/*
          target: /tmp/deploy-backend
          strip_components: 2

      - name: Deploy backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -eux
            rm -rf /var/www/html/lift-tracker/publish
            mkdir -p /var/www/html/lift-tracker/publish
            cp -a /tmp/deploy-backend/. /var/www/html/lift-tracker/publish/
            sudo systemctl reload nginx
            sudo systemctl restart lt-api
