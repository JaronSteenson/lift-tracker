image: node:14.19.1

pipelines:
  branches:
    master:
      - parallel:
          - step:
              name: Build and test backend
              image: php:7.2-fpm
              caches:
                - composer
              script:
                - apt-get update && apt-get install -qy git curl libmcrypt-dev default-mysql-client
                - yes | pecl install mcrypt-1.0.1
                - docker-php-ext-install pdo_mysql
                - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
                - composer install
                - ln -f -s .env.pipelines .env
                - php artisan migrate --database=mysql_test
                - php artisan serve &
                - sleep 5
                - ./vendor/bin/phpunit --log-junit ./test-reports/junit.xml
              services:
                - mysql
              artifacts:
                - vendor/**
                - routes/**
                - database/**
                - config/**
                - app/**
          - step:
              name: Build and test frontend
              caches:
                - node
              script:
                - npm install
                - npm run lint
                - npm test
                - npm run prod
              artifacts:
                - public/**
      - step:
          name: Deploy frontend artifacts using SCP to PROD
          deployment: Production
          script:
            - tar -czvf artifacts.tar.gz vendor routes database config app public
            - pipe: atlassian/ssh-run:0.4.1
              variables:
                SSH_USER: $PROD_USER
                SERVER: $PROD_IP
                MODE: "command"
                COMMAND: >
                  rm -rf /tmp/deploy/
                  && mkdir /tmp/deploy/
            - pipe: atlassian/scp-deploy:0.3.3
              variables:
                USER: $PROD_USER
                SERVER: $PROD_IP
                REMOTE_PATH: "/tmp/deploy"
                LOCAL_PATH: "artifacts.tar.gz"
                EXTRA_ARGS: ["-r"]
            - pipe: atlassian/ssh-run:0.4.1
              variables:
                SSH_USER: $PROD_USER
                SERVER: $PROD_IP
                MODE: "command"
                COMMAND: >
                  tar -xvf /tmp/deploy/artifacts.tar.gz
                  && rm /tmp/deploy/artifacts.tar.gz
                  && cp -rf /tmp/deploy /var/www/html/lift-tracker
                  && php /var/www/html/lift-tracker/artisan migrate
      - step:
          name: Cloudflare cdn cache purge
          deployment: Cloudflare
          script:
            - >
              curl \
               -X POST "https://api.cloudflare.com/client/v4/zones/c1c95b982d4310a8f3ccd3b8483c6df7/purge_cache" \
               -H "Authorization: Bearer $CLOUDFLARE_AUTH_TOKEN" \
               -H "Content-Type:application/json" \
               --data '{"purge_everything":true}'
definitions:
  services:
    mysql:
      image: mysql:5.7
      environment:
        MYSQL_DATABASE: "lift_tracker_test"
        MYSQL_RANDOM_ROOT_PASSWORD: "no"
        MYSQL_USER: "lift_tracker_test"
        MYSQL_PASSWORD: "lift_tracker_test"
