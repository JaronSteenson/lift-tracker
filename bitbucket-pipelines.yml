          - step:
              name: Build, test, dotnet api
              image: mcr.microsoft.com/dotnet/sdk:9.0
              caches:
                - dotnetcore
              script:
                - dotnet tool install --global dotnet-ef
                - export PATH="~/.dotnet/tools:$PATH";
                - (cd LiftTrackerApi && dotnet build)
                - (cd LiftTrackerApi && ASPNETCORE_ENVIRONMENT=Test dotnet ef database update)
                - (cd LiftTrackerApi.Tests && dotnet test)
              services:
                - mysql
      - step:
          name: Tagging successful build
          deployment: Cloudflare
          script:
            - git fetch origin "refs/notes/*:refs/notes/*" -f
            - git notes add -f -m 'ci-build-pass' && git push origin refs/notes/*

