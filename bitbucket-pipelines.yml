image: node:14.19.1

pipelines:
  branches:
    master:
      - step:
          name: Build and test
          caches:
            - node
          script:
            - npm install
            - npm test
            - npm run prod
          artifacts:
            - public/**
      - step:
          name: Deploy frontend artifacts using SCP to PROD
          deployment: production
          script:
            - pipe: atlassian/scp-deploy:0.3.3
              variables:
                USER: $PROD_USER
                SERVER: $PROD_IP
                REMOTE_PATH: '/var/www/html/lift-tracker/public'
                LOCAL_PATH: 'public/*'
