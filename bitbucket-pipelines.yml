image: node:14.19.1

pipelines:
  branches:
    master:
      - parallel:
          - step:
              name: Build, test, deploy backend
              image: php:7.2-fpm
              caches:
                - composer
              script:
                - apt-get update
                - apt-get install -qy git
                - . ci/should-build-backend.sh
                - apt-get install -qy curl libmcrypt-dev default-mysql-client
                - git fetch origin refs/notes/*:refs/notes/*
                - git push origin refs/notes/*
                - yes | pecl install mcrypt-1.0.1
                - docker-php-ext-install pdo_mysql
                - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
                - composer install
                - ln -f -s .env.pipelines .env
                - php artisan migrate --database=mysql_test
                - ./vendor/bin/phpunit --log-junit ./test-reports/junit.xml
                - echo 'Starting deploy';
                - tar -czvf artifacts-backend.tar.gz app composer.json composer.lock config database routes vendor;
                - pipe: atlassian/ssh-run:0.4.1
                  variables:
                    SSH_USER: $PROD_USER
                    SERVER: $PROD_IP
                    MODE: "command"
                    COMMAND: >
                      rm -rf /tmp/deploy-backend/
                      && mkdir /tmp/deploy-backend/
                - pipe: atlassian/scp-deploy:0.3.3
                  variables:
                    USER: $PROD_USER
                    SERVER: $PROD_IP
                    REMOTE_PATH: "/tmp/deploy-backend"
                    LOCAL_PATH: "artifacts-backend.tar.gz"
                    EXTRA_ARGS: [ "-r" ]
                - pipe: atlassian/ssh-run:0.4.1
                  variables:
                    SSH_USER: $PROD_USER
                    SERVER: $PROD_IP
                    MODE: "command"
                    COMMAND: >
                      tar -xvf /tmp/deploy-backend/artifacts-backend.tar.gz -C /var/www/html/lift-tracker
                      && cd /var/www/html/lift-tracker
                      && php artisan optimize:clear
                      && php artisan migrate
              services:
                - mysql
          - step:
              name: Build, test, deploy frontend
              caches:
                - node
              script:
                - . ci/should-build-frontend.sh
                - npm ci
                - npm run lint
                - npm test
                - npm run prod
                - echo 'Starting deploy';
                - tar -czvf artifacts-frontend.tar.gz public;
                - pipe: atlassian/ssh-run:0.4.1
                  variables:
                    SSH_USER: $PROD_USER
                    SERVER: $PROD_IP
                    MODE: "command"
                    COMMAND: >
                      rm -rf /tmp/deploy-frontend
                      && mkdir /tmp/deploy-frontend
                - pipe: atlassian/scp-deploy:0.3.3
                  variables:
                    USER: $PROD_USER
                    SERVER: $PROD_IP

                    REMOTE_PATH: "/tmp/deploy-frontend"
                    LOCAL_PATH: "artifacts-frontend.tar.gz"
                    EXTRA_ARGS: [ "-r" ]
                - pipe: atlassian/ssh-run:0.4.1
                  variables:
                    SSH_USER: $PROD_USER
                    SERVER: $PROD_IP
                    MODE: "command"
                    COMMAND: >
                      tar -xvf /tmp/deploy-frontend/artifacts-frontend.tar.gz -C /var/www/html/lift-tracker
                - echo 'Purging CDN cache'
                - >
                  curl \
                   -X POST "https://api.cloudflare.com/client/v4/zones/c1c95b982d4310a8f3ccd3b8483c6df7/purge_cache" \
                   -H "Authorization: Bearer $CLOUDFLARE_AUTH_TOKEN" \
                   -H "Content-Type:application/json" \
                   --data '{"purge_everything":true}'
      - step:
          name: Tagging successful build
          deployment: Cloudflare
          script:
            - git fetch origin "refs/notes/*:refs/notes/*" -f
            - git notes add -f -m 'ci-build-pass' && git push origin refs/notes/*
definitions:
  services:
    mysql:
      image: mysql:5.7
      environment:
        MYSQL_DATABASE: "lift_tracker_test"
        MYSQL_RANDOM_ROOT_PASSWORD: "no"
        MYSQL_USER: "lift_tracker_test"
        MYSQL_PASSWORD: "lift_tracker_test"
